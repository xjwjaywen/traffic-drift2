# Evaluation config: CESNET-QUIC22 temporal evaluation
# Tests all methods across W-45, W-46, W-47

data:
  dataset: quic22
  data_dir: ./data
  size: S
  train_period: "W-2022-44"
  test_period: "W-2022-45"     # For single-period mode
  test_periods:                 # For sequential mode
    - "W-2022-45"
    - "W-2022-46"
    - "W-2022-47"
  batch_size: 256
  num_workers: 4

methods:
  - static
  - bn_adapt
  - tent
  - eata
  - cotta
  - sar
  - note
  - tta_tc

tta:
  # Baseline TTA params (used by Tent/EATA/CoTTA/SAR/NOTE)
  adapt_lr: 0.00001
  adapt_mode: encoder
  adapt_batch_size: 64
  ema_momentum: 0.999
  restore_prob: 0.01
  fisher_alpha: 2000.0
  entropy_threshold: 0.5
  energy_threshold: -5.0
  entropy_filter_ratio: 0.4
  buffer_size: 1000
  adapt_steps: 1
  min_drifted_classes: 3
  abrupt_adapt_steps: 10
  drift_lr_gamma: 3.0
  # Position-Aware Drift Masking + OT params
  drift_z_threshold: 2.0       # z-score threshold for flagging drifted positions
  spa_temperature: 0.1         # prototype similarity temperature
  ot_epsilon: 0.1              # Sinkhorn regularization
  ot_max_iter: 50              # Sinkhorn iterations
  transport_weight: 0.5        # blend weight: 0=pure static, 1=pure OT

output_dir: outputs/eval_quic22
