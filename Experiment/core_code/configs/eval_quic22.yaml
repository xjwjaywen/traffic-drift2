# Evaluation config: CESNET-QUIC22 temporal evaluation
# Tests all methods across W-45, W-46, W-47

data:
  dataset: quic22
  data_dir: ./data
  size: XS
  train_period: "W-2022-44"
  test_period: "W-2022-45"     # For single-period mode
  test_periods:                 # For sequential mode
    - "W-2022-45"
    - "W-2022-46"
    - "W-2022-47"
  batch_size: 256
  num_workers: 4

methods:
  - static
  - bn_adapt
  - tent
  - eata
  - cotta
  - sar
  - note
  - tta_tc

tta:
  adapt_lr: 0.0001
  adapt_mode: encoder
  adapt_batch_size: 64
  ema_momentum: 0.999
  restore_prob: 0.01
  fisher_alpha: 2000.0
  mask_ratio: 0.15
  enable_mpfp: true
  enable_pop: true
  enable_fsr: true
  ssl_alpha: 0.2
  ssl_beta: 0.1
  entropy_threshold: 0.5
  energy_threshold: -5.0
  entropy_filter_ratio: 0.4
  buffer_size: 1000
  adapt_steps: 1
  abrupt_adapt_steps: 10
  drift_lr_gamma: 3.0

output_dir: outputs/eval_quic22
