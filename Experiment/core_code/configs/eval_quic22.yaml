# Evaluation config: CESNET-QUIC22 temporal evaluation
# Tests all methods across W-45, W-46, W-47

data:
  dataset: quic22
  data_dir: ./data
  size: S
  train_period: "W-2022-44"
  test_period: "W-2022-45"     # For single-period mode
  test_periods:                 # For sequential mode
    - "W-2022-45"
    - "W-2022-46"
    - "W-2022-47"
  batch_size: 256
  num_workers: 4

methods:
  - static
  - bn_adapt
  - tent
  - eata
  - cotta
  - sar
  - note
  - tta_tc

tta:
  adapt_lr: 0.00001
  adapt_mode: encoder
  adapt_batch_size: 64
  ema_momentum: 0.999
  restore_prob: 0.01
  fisher_alpha: 2000.0
  entropy_threshold: 0.5
  energy_threshold: -5.0
  entropy_filter_ratio: 0.4
  buffer_size: 1000
  adapt_steps: 1
  min_drifted_classes: 3
  abrupt_adapt_steps: 10
  drift_lr_gamma: 3.0
  spa_temperature: 0.07   # InfoNCE temperature (lower = sharper contrast)
  casa_weight_tau: 1.0    # class drift weight sharpness (higher = more focus on drifted classes)
  proto_drift_threshold: 0.05  # global prototype drift gate (skip if mean drift < threshold)
  confidence_threshold: 0.3    # discard samples with cosine sim < threshold (filter noisy pseudo-labels)

output_dir: outputs/eval_quic22
