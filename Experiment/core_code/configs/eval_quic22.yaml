# Evaluation config: CESNET-QUIC22 temporal evaluation
# Tests all methods across W-45, W-46, W-47

data:
  dataset: quic22
  data_dir: ./data
  size: S
  train_period: "W-2022-44"
  test_period: "W-2022-45"     # For single-period mode
  test_periods:                 # For sequential mode
    - "W-2022-45"
    - "W-2022-46"
    - "W-2022-47"
  batch_size: 256
  num_workers: 4

methods:
  - static
  - bn_adapt
  - tent
  - eata
  - cotta
  - sar
  - note
  - tta_tc

tta:
  # Baseline TTA params (used by Tent/EATA/CoTTA/SAR/NOTE)
  adapt_lr: 0.00001
  adapt_mode: encoder
  adapt_batch_size: 64
  ema_momentum: 0.999
  restore_prob: 0.01
  fisher_alpha: 2000.0
  entropy_threshold: 0.5
  energy_threshold: -5.0
  entropy_filter_ratio: 0.4
  buffer_size: 1000
  adapt_steps: 1
  min_drifted_classes: 3
  abrupt_adapt_steps: 10
  drift_lr_gamma: 3.0
  # CASA-Inf params (inference-time prototype interpolation)
  spa_temperature: 0.1          # prototype similarity temperature
  proto_momentum: 0.99          # EMA momentum for running prototype updates
  alpha_scale: 5.0              # drift-to-alpha scaling factor
  alpha_max: 0.5                # max blending weight (0.5 = at most half prototype)
  proto_drift_threshold: 0.02   # drift below this -> alpha=0 (pure static)

output_dir: outputs/eval_quic22
