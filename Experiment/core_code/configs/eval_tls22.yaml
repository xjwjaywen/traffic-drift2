# Evaluation config: CESNET-TLS-Year22 long-term evaluation
# Tests across 9 months (M-4 to M-12)

data:
  dataset: tls22
  data_dir: ./data/tls22
  size: S
  train_period: "M-2022-3"
  test_period: "M-2022-5"
  test_periods:
    - "M-2022-4"
    - "M-2022-5"
    - "M-2022-6"
    - "M-2022-7"
    - "M-2022-8"
    - "M-2022-9"
    - "M-2022-10"
    - "M-2022-11"
    - "M-2022-12"
  batch_size: 256
  num_workers: 4

methods:
  - static
  - bn_adapt
  - tent
  - eata
  - cotta
  - sar
  - note
  - tta_tc

tta:
  # Baseline TTA params
  adapt_lr: 0.00001
  adapt_mode: encoder
  adapt_batch_size: 64
  ema_momentum: 0.999
  restore_prob: 0.01
  fisher_alpha: 2000.0
  entropy_threshold: 0.5
  energy_threshold: -5.0
  entropy_filter_ratio: 0.4
  buffer_size: 2000
  adapt_steps: 1
  min_drifted_classes: 3
  abrupt_adapt_steps: 10
  drift_lr_gamma: 3.0
  # OT-TTA params
  spa_temperature: 0.1
  ot_epsilon: 0.1
  ot_max_iter: 50
  transport_weight: 0.5

output_dir: outputs/eval_tls22
