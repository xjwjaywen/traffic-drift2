# Evaluation config: CESNET-TLS-Year22 long-term evaluation
# Tests across 9 months (M-4 to M-12)

data:
  dataset: tls22
  data_dir: ./data
  size: XS
  train_period: "M-2022-3"
  test_period: "M-2022-5"
  test_periods:
    - "M-2022-4"
    - "M-2022-5"
    - "M-2022-6"
    - "M-2022-7"
    - "M-2022-8"
    - "M-2022-9"
    - "M-2022-10"
    - "M-2022-11"
    - "M-2022-12"
  batch_size: 256
  num_workers: 4

methods:
  - static
  - bn_adapt
  - tent
  - eata
  - tta_tc

tta:
  adapt_lr: 0.0001
  adapt_mode: encoder
  ema_momentum: 0.999
  restore_prob: 0.01
  fisher_alpha: 2000.0
  mask_ratio: 0.15
  enable_mpfp: true
  enable_pop: true
  enable_fsr: true
  ssl_alpha: 0.2
  ssl_beta: 0.1
  entropy_threshold: 0.5
  buffer_size: 2000

output_dir: outputs/eval_tls22
